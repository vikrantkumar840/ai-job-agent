version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: aijob-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: aijobagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0

    container_name: aijob-mongodb

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest

    container_name: aijob-qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:

  postgres_data:

  mongo_data:

  qdrant_data:
